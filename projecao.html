<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bingo — Projeção</title>
  <link rel="stylesheet" href="estilo.css">
</head>

<body class="tela-projecao">

  <!-- ── POP-UP DO PREÇO DA RODADA (exibido até o 1º número ser sorteado) ── -->
  <div class="overlay-preco" id="overlay-preco">
    <div class="overlay-preco-caixa">
      <div class="overlay-preco-rotulo">Preço desta rodada</div>
      <div class="overlay-preco-valor" id="overlay-preco-valor"></div>
    </div>
  </div>

  <!-- ── LAYOUT PRINCIPAL (3 colunas via CSS Grid) ─────────── -->
  <main class="layout-principal">

    <!-- COLUNA 1: Grade dos 75 números -->
    <div class="painel painel-grade">

      <!-- Letras B I N G O no topo -->
      <div class="bingo-cabecalho">
        <span class="bingo-letra">B</span>
        <span class="bingo-letra">I</span>
        <span class="bingo-letra">N</span>
        <span class="bingo-letra">G</span>
        <span class="bingo-letra">O</span>
      </div>

      <!-- Os 75 números serão inseridos aqui pelo JavaScript -->
      <div class="bingo-grade" id="grade-numeros"></div>
    </div>

    <!-- COLUNA 2: Prêmios (acima) e número sorteado (abaixo) -->
    <div class="coluna-lateral">

      <!-- Prêmios -->
      <div class="painel painel-premios">
        <div class="rodada-texto" id="rodada-texto">RODADA 1</div>
        <div class="premios-titulo" id="premios-titulo">Prêmios</div>

        <!-- Os prêmios serão inseridos aqui pelo JavaScript -->
        <div id="lista-premios"></div>
      </div>

      <!-- Número atual sorteado -->
      <div class="painel painel-numero">
        <div class="numero-atual" id="numero-atual">
          <div class="numero-vazio">Aguardando<br>sorteio...</div>
        </div>
      </div>

    </div>

  </main>

  <!-- ── SCRIPTS ───────────────────────────────────────────── -->
  <script src="bingo.js"></script>
  <script>

    function construirGrade() {
      const grade = document.getElementById('grade-numeros');

      // Cada letra (B/I/N/G/O) tem 15 números, divididos em 2 sub-colunas:
      // 1ª sub-coluna: 8 números | 2ª sub-coluna: 7 números (8 linhas no total)
      const inicios = [1, 16, 31, 46, 61]; // início de cada letra

      for (let linha = 1; linha <= 8; linha++) {
        for (const inicio of inicios) {
          const numeroCol1 = inicio + (linha - 1);
          const numeroCol2 = inicio + 7 + linha; // a partir do 9º número da letra

          [numeroCol1, numeroCol2].forEach(function(numero) {
            const celula = document.createElement('div');
            celula.classList.add('bingo-celula');

            const fimLetra = inicio + 14;
            if (numero <= fimLetra) {
              celula.textContent = numero;
              celula.dataset.numero = numero;
            } else {
              celula.classList.add('bingo-celula-vazia');
            }

            grade.appendChild(celula);
          });
        }
      }
    }

    construirGrade();

    function renderizar() {
      document.body.classList.toggle('modo-escuro', estado.tema === 'escuro');

      document.getElementById('rodada-texto').textContent =
        'RODADA ' + estado.rodada;

      const overlayPreco = document.getElementById('overlay-preco');
      const rodadaJaIniciou = estado.sorteados.length > 0;

      if (!rodadaJaIniciou && estado.preco) {
        document.getElementById('overlay-preco-valor').textContent = 'R$ ' + estado.preco;
        overlayPreco.classList.add('visivel');
      } else {
        overlayPreco.classList.remove('visivel');
      }

      document.querySelectorAll('.bingo-celula').forEach(function(celula) {
        celula.classList.remove('sorteado');
      });

      estado.sorteados.forEach(function(numero) {
        const celula = document.querySelector('[data-numero="' + numero + '"]');
        if (celula) {
          celula.classList.add('sorteado');
        }
      });


      const painelNumero = document.getElementById('numero-atual');

      if (estado.numeroAtual) {
        painelNumero.innerHTML =
          '<div class="numero-rotulo">Último número chamado:</div>' +
          '<div class="numero-letra">' + estado.numeroAtual.letra + '</div>' +
          '<div class="numero-valor">' + estado.numeroAtual.numero + '</div>';
      } else {
        painelNumero.innerHTML =
          '<div class="numero-vazio">Aguardando<br>sorteio...</div>';
      }

      const listaPremios = document.getElementById('lista-premios');
      listaPremios.innerHTML = '';

      if (estado.premios.length === 0) {
        listaPremios.innerHTML =
          '<p style="color: #555; font-size: 14px;">Prêmios não configurados</p>';
      } else {
        estado.premios.forEach(function(premio) {
          const item = document.createElement('div');
          item.classList.add('premio-item');
          item.innerHTML =
            '<div class="premio-quina">' + premio.quina + 'ª Quina</div>' +
            '<div class="premio-descricao">' + (premio.descricao || '—') + '</div>';
          listaPremios.appendChild(item);
        });
      }
    }

    renderizar();

  </script>

</body>
</html>
